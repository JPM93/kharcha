<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kharcha — Icon Generator</title>
  <style>
    body { font-family: monospace; background: #050d0e; color: #e0f2f1; padding: 20px; }
    h2 { color: #2dd4bf; margin-bottom: 16px; }
    .grid { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; }
    canvas { border: 1px solid #1e3f43; border-radius: 8px; }
    button {
      background: linear-gradient(135deg, #14b8a6, #0ea5e9);
      border: none; color: #050d0e; padding: 10px 20px;
      border-radius: 8px; font-family: monospace; font-size: 13px;
      font-weight: 700; cursor: pointer; margin-top: 10px;
    }
    p { color: #5a8080; font-size: 12px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h2>💸 Kharcha — PWA Icon Generator</h2>
  <p>Neeche "Download All Icons" click karo — sab icons ek saath download ho jayenge.<br>
     Phir inhe apne project ke <code>icons/</code> folder mein daalo.</p>
  <div class="grid" id="grid"></div>
  <button onclick="downloadAll()">⬇ Download All Icons</button>

<script>
const SIZES = [72, 96, 128, 144, 152, 192, 384, 512];
const BG_COLOR   = '#0d1f21';
const RING_COLOR = '#2dd4bf';
const EMOJI      = '💸';

function drawIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width  = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  const grad = ctx.createRadialGradient(size*.5, size*.4, 0, size*.5, size*.5, size*.7);
  grad.addColorStop(0, '#122628');
  grad.addColorStop(1, '#050d0e');
  ctx.fillStyle = grad;

  // Rounded rect
  const r = size * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
  ctx.arcTo(size, 0, size, r, r);
  ctx.lineTo(size, size-r);
  ctx.arcTo(size, size, size-r, size, r);
  ctx.lineTo(r, size);
  ctx.arcTo(0, size, 0, size-r, r);
  ctx.lineTo(0, r);
  ctx.arcTo(0, 0, r, 0, r);
  ctx.closePath();
  ctx.fill();

  // Ring border
  ctx.strokeStyle = RING_COLOR;
  ctx.lineWidth = size * 0.035;
  ctx.stroke();

  // Emoji
  ctx.font = `${size * 0.52}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(EMOJI, size * 0.5, size * 0.52);

  // "K" watermark bottom
  ctx.font = `bold ${size * 0.13}px 'Courier New', monospace`;
  ctx.fillStyle = RING_COLOR;
  ctx.globalAlpha = 0.7;
  ctx.fillText('KHARCHA', size * 0.5, size * 0.88);
  ctx.globalAlpha = 1;

  return canvas;
}

function init() {
  const grid = document.getElementById('grid');
  SIZES.forEach(size => {
    const canvas = drawIcon(size);
    canvas.title = `${size}x${size}`;
    const wrap = document.createElement('div');
    wrap.style.textAlign = 'center';
    const label = document.createElement('div');
    label.style.cssText = 'font-size:10px;color:#5a8080;margin-top:4px';
    label.textContent = `${size}×${size}`;
    wrap.appendChild(canvas);
    wrap.appendChild(label);
    grid.appendChild(wrap);
  });
}

function downloadAll() {
  SIZES.forEach((size, i) => {
    setTimeout(() => {
      const canvas = drawIcon(size);
      const a = document.createElement('a');
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }, i * 300);
  });
}

init();
</script>
</body>
</html>
